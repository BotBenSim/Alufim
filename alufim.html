/* ============ persistence (versioned, multi-profile) ============ */
// Settings and character progress are SEPARATE within each profile, and updates
// are targeted read-modify-write, so editing settings never clobbers XP/forms.
var STATE_KEY = "alufim_state_v2";
function defaultGames(){
  return {
    find: { enabled:true,  level:"easy" },
    add:  { enabled:true,  level:"easy" },
    sub:  { enabled:true,  level:"easy" },
    eng:  { enabled:false, level:"easy" }
  };
}
function newProfile(name, avatar, rhythm){
  var chars = {};
  CHARACTERS.forEach(function(c){ if (c.starter) chars[c.id] = { form:0, totalXp:0 }; });
  return { id:"p" + Date.now() + "_" + rnd(99999), name:name || "ילד/ה", avatar:avatar || "🙂",
           rhythm:rhythm || "kid", games:defaultGames(), characters:chars, activeCharacterId:null };
}
function migrateProfile(p){
  // fill missing fields without touching existing progress (forward-compatible)
  if (!p.games) p.games = defaultGames();
  GAME_ORDER.forEach(function(g){
    if (!p.games[g]) p.games[g] = { enabled:(g !== "eng"), level:"easy" };
    if (!p.games[g].level) p.games[g].level = "easy";
  });
  if (!p.characters) p.characters = {};
  // ensure every starter is owned (adds newly-released starters to old saves, progress untouched)
  CHARACTERS.forEach(function(c){ if (c.starter && !p.characters[c.id]) p.characters[c.id] = { form:0, totalXp:0 }; });
  if (!p.rhythm) p.rhythm = "kid";
  if (!p.avatar) p.avatar = "🙂";
  return p;
}
function loadState(){
  var st = null;
  try { var raw = localStorage.getItem(STATE_KEY); if (raw) st = JSON.parse(raw); } catch(e){}
  if (!st || !st.profiles) st = { version:2, profiles:[], lastProfileId:null };
  st.profiles = st.profiles.map(migrateProfile);
  appState = st;
  if (!appState.profiles.length) seedPresetProfiles();   // familiar faces on first run
  return appState;
}
function saveState(){ try { localStorage.setItem(STATE_KEY, JSON.stringify(appState)); } catch(e){} }
function seedPresetProfiles(){
  var presets = [
    { name:"אלי",  avatar:PHOTOS.ellie, rhythm:"toddler", eng:false },
    { name:"איתן", avatar:PHOTOS.ethan, rhythm:"kid",     eng:true  },
    { name:"נובה", avatar:PHOTOS.nova,  rhythm:"kid",     eng:true  },
    { name:"יוני", avatar:PHOTOS.uni,   rhythm:"toddler", eng:false }
  ];
  presets.forEach(function(pr){
    var p = newProfile(pr.name, pr.avatar, pr.rhythm);
    p.games.eng.enabled = pr.eng;
    appState.profiles.push(p);
  });
  saveState();
}

/* ============ avatar helpers (emoji or kid photo) ============ */
function isImgAvatar(a){ return typeof a === "string" && a.indexOf("data:") === 0; }
function avatarHTML(a, size){
  size = size || 24;
  if (isImgAvatar(a)) return "<img src='" + a + "' style='width:" + size + "px;height:" + size + "px;border-radius:50%;object-fit:cover;vertical-align:middle'>";
  return "<span style='font-size:" + size + "px;vertical-align:middle'>" + (a || "🙂") + "</span>";
}

/* ============ screens & navigation ============ */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(function(s){ s.classList.remove("active"); });
  if (id) $(id).classList.add("active");
}
function findProfile(id){ for (var i=0;i<appState.profiles.length;i++){ if (appState.profiles[i].id===id) return appState.profiles[i]; } return null; }

/* ---- profile select ---- */
function renderProfiles(){
  var wrap = $("profileCards"); wrap.innerHTML = "";
  appState.profiles.forEach(function(p){
    var holder = document.createElement("div");
    holder.className = "profileHolder";
    var btn = document.createElement("button");
    btn.className = "card nova" + (p.id === appState.lastProfileId ? " selp" : "");
    var face = isImgAvatar(p.avatar) ? "<img class='face' src='" + p.avatar + "'>" : "<span class='big'>" + (p.avatar || "🙂") + "</span>";
    btn.innerHTML = face + "<span>" + p.name + "</span>";
    btn.addEventListener("click", function(){
      wrap.querySelectorAll(".card.selp").forEach(function(c){ c.classList.remove("selp"); });
      btn.classList.add("selp");
      selectProfile(p.id);
    });
    var edit = document.createElement("button");
    edit.className = "editPencil"; edit.textContent = "✏️"; edit.title = "ערוך פרופיל";
    edit.addEventListener("click", function(e){ e.stopPropagation(); openProfileEditor(p.id); });
    holder.appendChild(btn); holder.appendChild(edit);
    wrap.appendChild(holder);
  });
  // empty "add" card sits right next to the players
  var addHolder = document.createElement("div");
  addHolder.className = "profileHolder";
  var add = document.createElement("button");
  add.className = "card addProfile";
  add.innerHTML = "<span class='big'>➕</span><span>פרופיל חדש</span>";
  add.addEventListener("click", function(){ openProfileEditor(null); });
  addHolder.appendChild(add);
  wrap.appendChild(addHolder);
}
function selectProfile(id){
  profile = findProfile(id);
  if (!profile) return;
  appState.lastProfileId = id; saveState();
  audio();
  speak("שלום " + profile.name);
  showCharacters();
}

/* ---- profile create / edit (non-destructive: never touches characters) ---- */
var AVATAR_EMOJIS = ["🦄","🦖","🚀","🐬","🦁","🐶","🐱","🐉","🐧","🐼","🦊","🐢"];
var editor = { id:null, avatar:"🙂", rhythm:"kid", games:null };
function openProfileEditor(id){
  var p = id ? findProfile(id) : null;
  editor.id = id || null;
  editor.avatar = p ? p.avatar : "🙂";
  editor.rhythm = p ? p.rhythm : "kid";
  editor.games = p ? JSON.parse(JSON.stringify(p.games)) : defaultGames();
  $("profileEditTitle").textContent = p ? ("עריכת " + p.name) : "פרופיל חדש";
  $("profileName").value = p ? p.name : "";
  $("profileDelete").style.display = id ? "" : "none";
  renderAvatarGrid(); renderRhythmSeg(); renderGameRows(); renderAdvChars();
  showScreen("scrProfileEdit");
}
function renderAvatarGrid(){
  var g = $("avatarGrid"); g.innerHTML = "";
  function addOpt(val, isImg){
    var b = document.createElement("button");
    b.className = "avatarOpt" + (val === editor.avatar ? " sel" : "");
    b.innerHTML = isImg ? "<img src='" + val + "'>" : val;
    b.addEventListener("click", function(){ editor.avatar = val; renderAvatarGrid(); });
    g.appendChild(b);
  }
  AVATAR_EMOJIS.forEach(function(e){ addOpt(e, false); });
  [PHOTOS.ellie, PHOTOS.ethan, PHOTOS.nova, PHOTOS.uni].forEach(function(ph){ addOpt(ph, true); });
}
function renderRhythmSeg(){
  var s = $("rhythmSeg"); s.innerHTML = "";
  ["toddler","kid"].forEach(function(r){
    var b = document.createElement("button");
    b.className = "segBtn" + (editor.rhythm === r ? " sel" : "");
    b.textContent = RHYTHM_LABELS[r];
    b.addEventListener("click", function(){ editor.rhythm = r; renderRhythmSeg(); });
    s.appendChild(b);
  });
}
function renderGameRows(){
  var host = $("gameRows"); host.innerHTML = "";
  GAME_ORDER.forEach(function(gid){
    var g = GAMES[gid];
    var cfg = editor.games[gid] || { enabled:false, level:"easy" };
    editor.games[gid] = cfg;
    var row = document.createElement("div"); row.className = "gameRow";
    var nm = document.createElement("div"); nm.className = "gName"; nm.textContent = g.icon + " " + g.title;
    var tog = document.createElement("button");
    tog.className = "segBtn" + (cfg.enabled ? " sel" : "");
    tog.textContent = cfg.enabled ? "פעיל" : "כבוי";
    tog.addEventListener("click", function(){ cfg.enabled = !cfg.enabled; renderGameRows(); });
    var lvlSeg = document.createElement("div"); lvlSeg.className = "seg" + (cfg.enabled ? "" : " dim");
    [["easy","קל"],["medium","בינוני"],["hard","קשה"]].forEach(function(pair){
      var lb = document.createElement("button");
      lb.className = "segBtn" + (cfg.level === pair[0] ? " sel" : "");
      lb.textContent = pair[1];
      lb.addEventListener("click", function(){ cfg.level = pair[0]; renderGameRows(); });
      lvlSeg.appendChild(lb);
    });
    row.appendChild(nm); row.appendChild(tog); row.appendChild(lvlSeg);
    host.appendChild(row);
  });
}
// Advanced: directly edit each owned animal's XP (e.g. to restore progress after a wipe).
function renderAdvChars(){
  var sec = $("advSection"), host = $("advChars"); host.innerHTML = "";
  if (!editor.id){ sec.style.display = "none"; return; }   // only for existing profiles
  var p = findProfile(editor.id);
  if (!p){ sec.style.display = "none"; return; }
  sec.style.display = "";
  CHARACTERS.forEach(function(c){
    var prog = p.characters[c.id];
    if (!prog) return;                                      // only owned animals
    var row = document.createElement("div"); row.className = "gameRow";
    var nm = document.createElement("div"); nm.className = "gName"; nm.textContent = c.he;
    var inp = document.createElement("input");
    inp.className = "finput"; inp.type = "number"; inp.min = "0"; inp.step = "1";
    inp.style.width = "100px"; inp.style.margin = "0";
    inp.value = prog.totalXp || 0;
    inp.setAttribute("data-cid", c.id);
    var formLbl = document.createElement("span");
    formLbl.className = "advForm";
    var setLbl = function(xp){ formLbl.textContent = "צורה " + (formForXp(xp, c.forms.length) + 1) + "/" + c.forms.length; };
    setLbl(prog.totalXp || 0);
    inp.addEventListener("input", function(){ setLbl(Math.max(0, parseInt(inp.value, 10) || 0)); });
    row.appendChild(nm); row.appendChild(inp); row.appendChild(formLbl);
    host.appendChild(row);
  });
}
function saveProfileEditor(){
  var name = ($("profileName").value || "").trim() || "ילד/ה";
  if (editor.id){
    var p = findProfile(editor.id);              // targeted edit: settings + advanced XP
    p.name = name; p.avatar = editor.avatar; p.rhythm = editor.rhythm; p.games = editor.games;
    $("advChars").querySelectorAll("input[data-cid]").forEach(function(inp){
      var cid = inp.getAttribute("data-cid"), c = characterById(cid), prog = p.characters[cid];
      if (!c || !prog) return;
      var xp = Math.max(0, parseInt(inp.value, 10) || 0);
      prog.totalXp = xp;
      prog.form = formForXp(xp, c.forms.length);  // keep stored form in sync with edited XP
    });
  } else {
    var np = newProfile(name, editor.avatar, editor.rhythm);
    np.games = editor.games;
    appState.profiles.push(np);
  }
  saveState();
  renderProfiles();
  showScreen("scrProfiles");
}
function deleteProfileEditor(){
  if (!editor.id) return;
  appState.profiles = appState.profiles.filter(function(p){ return p.id !== editor.id; });
  if (appState.lastProfileId === editor.id) appState.lastProfileId = null;
  saveState(); renderProfiles(); showScreen("scrProfiles");
}

/* ---- character picker ---- */
var pickedCharId = null;   // animal marked on the picker (tap = preview + mark; pick button starts)
function showCharacters(){
  showScreen("scrProfiles");
  pickedCharId = null;
  $("gameSection").classList.remove("show");      // games hidden until an animal is chosen
  var grid = $("charGrid"); grid.innerHTML = "";
  CHARACTERS.forEach(function(c){
    var owned = !!profile.characters[c.id];
    var card = document.createElement("button");
    card.className = "charCard" + (owned ? "" : " locked");

    // show the animal's CURRENT grown form (falls back to egg), or a lock if unowned
    var art = document.createElement("span");
    art.className = "cArt";
    if (owned){
      var prog = profile.characters[c.id] || {};
      var fi = formForXp(prog.totalXp || 0, c.forms.length);   // derived from cumulative XP + thresholds
      renderCharacterArt(c.forms[Math.min(fi, c.forms.length - 1)], art);
    } else art.textContent = "🔒";
    card.appendChild(art);

    var name = document.createElement("span");
    name.className = "cName"; name.textContent = c.he;
    card.appendChild(name);

    if (owned){
      card.addEventListener("click", function(){
        // mark this animal, say its name, preview it, then reveal its games inline
        var prev = grid.querySelector(".charCard.picked");
        if (prev) prev.classList.remove("picked");
        card.classList.add("picked");
        pickedCharId = c.id;
        audio(); speak(c.he);
        previewLifecycle(c.id);
        selectCharacter(c.id);
      });
    }
    grid.appendChild(card);
  });
  var section = $("charSection");
  section.classList.add("show");
  section.scrollIntoView({ behavior:"smooth", block:"nearest" });
}
// Plays every transition back-to-back in the evolve overlay (no tap game) as a preview.
function previewLifecycle(charId){
  var c = characterById(charId); if (!c) return;
  var myToken = ++animSeq;                              // claim this animation generation
  audio();
  var ov = $("ovEvolve"), cre = $("evolveCreature"), meter = $("evolveMeterWrap");
  ov.style.background = "";                            // translucent scrim over the chars screen
  meter.style.display = "none";                        // no charge meter in preview
  cre.style.display = "none"; cre.onclick = null;       // preview uses the filmstrip, not the button
  $("evolveHint").textContent = "";
  $("evolveTitle").textContent = "";                    // no name — just the picture swipe
  ov.classList.add("show");
  sFanfare();
  var swept = false;                                   // ignore taps until the sweep is done
  var restore = function(){ cre.style.display = ""; cre.style.pointerEvents = ""; meter.style.display = ""; hideFilmstrip(); };
  var close = function(){
    if (myToken !== animSeq) return;                   // a newer animation owns the overlay now
    if (!ov.classList.contains("show")) return;
    ov.onclick = null; ov.classList.remove("show"); restore();
  };
  ov.onclick = function(){ if (swept && myToken === animSeq) close(); };
  playFilmstrip(c, c.forms.length - 1, 340, myToken, function(){
    swept = true;
    setTimeout(close, 800);                            // auto-close shortly after the sweep
  });
}
function selectCharacter(id){
  var c = characterById(id); if (!c) return;
  if (!profile.characters[id]) profile.characters[id] = { form:0, totalXp:0 };
  profile.activeCharacterId = id; saveState();
  run = { character:c };
  audio();
  selectedGameId = null;                               // reset game choice for the new animal
  $("gamePlay").disabled = true;
  renderGameCards("gameCardsHome");
  var gs = $("gameSection"); gs.classList.add("show");
  gs.scrollIntoView({ behavior:"smooth", block:"nearest" });
}

/* ============ dynamic game cards (only games this profile enabled) ============ */
var selectedGameId = null;   // game marked on the home screen (tap = mark; play button starts)
function renderGameCards(wrapId){
  var home = (wrapId === "gameCardsHome");
  var wrap = $(wrapId || "gameCards"); wrap.innerHTML = "";
  GAME_ORDER.forEach(function(key){
    if (!(profile.games[key] && profile.games[key].enabled)) return;
    var g = GAMES[key];
    var btn = document.createElement("button");
    btn.className = "card " + g.cardClass;
    btn.innerHTML = "<span class='big'>" + g.icon + "</span><span>" + g.title + "</span>";
    if (home){
      btn.addEventListener("click", function(){
        var prev = wrap.querySelector(".card.selp");
        if (prev) prev.classList.remove("selp");
        btn.classList.add("selp");
        selectedGameId = key;
        $("gamePlay").disabled = false;
        audio();
        speak(g.title);
      });
    } else {
      btn.addEventListener("click", function(){ startSession(key); });
    }
    wrap.appendChild(btn);
  });
}

    "<li><b>אתגר נכון (Flow):</b> משחקים מופעלים ורמה לכל ילד — הקטנה בקלות, הגדולה באתגר.</li>" +
    "<li><b>שליטה על ניחוש:</b> דיוק מוריד XP אבל לעולם לא לאפס — מתגמל ידע, בלי בושה.</li>" +
    "<li><b>בלי עונש/טיימר/חיים:</b> טעות = 'כמעט, נסו שוב', בלי לאבד התקדמות.</li>" +
    "<li><b>נקודת עצירה טובה:</b> רגע ההתפתחות הוא מקום נעים לעצור.</li>" +
    "</ul>" +

    "<h3>ארכיטקטורה (לעתיד)</h3>" +
    "<p>ליבה משותפת + טבלאות נתונים: CHARACTERS, GAMES, RHYTHM_PRESETS, GAME_DIFFICULTY. הוספת חיה/משחק/קצב/בנד קושי = עריכת טבלה אחת. כל הצגת חיה עוברת ב-renderCharacterArt(), וההתפתחות ב-playEvolveAnimation() — כך מחליפים אימוג'י בתמונות/ספרייטים בלי לגעת במנוע.</p>";
}


/* ============ wire up ============ */
loadState();
renderProfiles();
// reflect saved state on the main screen: re-open the last player's animals (no greeting sound)
if (appState.lastProfileId && findProfile(appState.lastProfileId)){
  profile = findProfile(appState.lastProfileId);
  showCharacters();
}

$("profileSave").addEventListener("click", saveProfileEditor);
$("profileCancel").addEventListener("click", function(){ showScreen("scrProfiles"); });
$("profileDelete").addEventListener("click", deleteProfileEditor);
$("gameBack").addEventListener("click", function(){ showCharacters(); });
$("gamePlay").addEventListener("click", function(){ if (selectedGameId) startSession(selectedGameId); });
$("swapGameBtn").addEventListener("click", openGamePicker);
$("homeBtn").addEventListener("click", goHome);

$("speakBtn").addEventListener("click", function(){
  if (!run || !run.current) return;
  if (run.phase === "mission" && run.mission){ speak(run.mission.say); return; }
  provider().speakPrompt(run.current);
});

$("aboutBtn").addEventListener("click", function(){ buildAbout(); showScreen("scrAbout"); });
$("aboutClose").addEventListener("click", function(){ showScreen("scrProfiles"); });
$("restartYes").addEventListener("click", goHome);
$("restartNo").addEventListener("click", function(){ $("ovRestart").classList.remove("show"); });
$("victoryRestart").addEventListener("click", goHome);

// prevent double-tap zoom on iOS
document.addEventListener("dblclick", function(e){ e.preventDefault(); }, { passive:false });
</script>
