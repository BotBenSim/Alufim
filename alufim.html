<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Alufim</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation; user-select:none; -webkit-user-select:none; }
  html,body { height:100%; overflow:hidden; }
  body {
    font-family: -apple-system, "Arial Hebrew", "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(180deg, #6FC3F7 0%, #A8DCFB 48%, #D9F1FF 100%);
    display:flex; flex-direction:column;
    position:fixed; inset:0;
  }
  /* ---------- screens ---------- */
  .screen { position:absolute; inset:0; display:none; flex-direction:column; align-items:center;
    justify-content:center; gap:26px; padding:20px; z-index:2; }
  .screen.active { display:flex; }
  .screen.scroll { justify-content:flex-start; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-top:24px; padding-bottom:40px; gap:16px; }
  h1 { font-size: clamp(30px, 6vw, 52px); color:#1D4E7A; text-shadow:0 2px 0 rgba(255,255,255,.7); text-align:center; }

  /* ---------- main-screen branding ---------- */
  #scrProfiles { padding-bottom:34px; gap:42px; }
  .brandWrap { display:flex; flex-direction:column; align-items:center; gap:2px; margin-top:6px; }
  .brand { font-size:clamp(48px,12vw,86px); font-weight:900; letter-spacing:1.5px; line-height:1;
    font-family:"Arial Rounded MT Bold","Helvetica Neue",-apple-system,sans-serif;
    color:#FFD12E;   /* sun yellow */
    text-shadow:
      -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 2px 2px 0 #fff,
      0 3px 0 #E69A00, 0 6px 9px rgba(0,0,0,.28); }

  /* ---------- shared scene: sun + rainbow + clouds + grass + trees (behind all screens) ---------- */
  #bgScene { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  #bgScene .sun { position:absolute; top:18px; left:26px; width:130px; height:130px; border-radius:50%;
    background:radial-gradient(circle,#FFE45E 52%,#FFD12E 100%);
    box-shadow:0 0 70px 26px rgba(255,210,46,.55); animation:sunPulse 5s ease-in-out infinite; }
  @keyframes sunPulse { 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.06); } }
  #bgScene .rainbow { position:absolute; top:-14%; left:50%; transform:translateX(-50%);
    width:min(150vw,1100px); aspect-ratio:2/1; opacity:.78;
    background:radial-gradient(circle at 50% 100%,
      rgba(255,255,255,0) 0 32%,
      #FF8787 32% 38%, #FFC078 38% 44%, #FFE066 44% 50%,
      #8CE99A 50% 56%, #74C0FC 56% 62%, #B197FC 62% 68%,
      rgba(255,255,255,0) 68% 100%);
    -webkit-mask-image:linear-gradient(180deg,#000 60%,transparent 100%);
    mask-image:linear-gradient(180deg,#000 60%,transparent 100%); }
  .skyCloud { position:absolute; background:#fff; border-radius:50px; opacity:.95;
    box-shadow:0 8px 16px rgba(60,90,120,.10); }
  .skyCloud::before, .skyCloud::after { content:""; position:absolute; background:#fff; border-radius:50%; }
  .sc1 { top:14%; width:100px; height:30px; animation:skyDrift 46s linear infinite; }
  .sc1::before { width:48px; height:48px; top:-22px; left:16px; }
  .sc1::after  { width:34px; height:34px; top:-16px; left:54px; }
  .sc2 { top:30%; width:70px; height:22px; animation:skyDrift 64s linear infinite; animation-delay:-26s; opacity:.85; }
  .sc2::before { width:32px; height:32px; top:-15px; left:10px; }
  .sc2::after  { width:24px; height:24px; top:-11px; left:36px; }
  .sc3 { top:8%; width:56px; height:18px; animation:skyDrift 54s linear infinite; animation-delay:-40s; opacity:.8; }
  .sc3::before { width:26px; height:26px; top:-12px; left:9px; }
  .sc3::after  { width:19px; height:19px; top:-9px; left:30px; }
  .sc4 { top:22%; width:84px; height:26px; animation:skyDrift 58s linear infinite; animation-delay:-15s; opacity:.9; }
  .sc4::before { width:40px; height:40px; top:-19px; left:13px; }
  .sc4::after  { width:28px; height:28px; top:-13px; left:46px; }
  .sc5 { top:42%; width:60px; height:19px; animation:skyDrift 72s linear infinite; animation-delay:-50s; opacity:.7; }
  .sc5::before { width:28px; height:28px; top:-13px; left:9px; }
  .sc5::after  { width:20px; height:20px; top:-9px; left:32px; }
  .sc6 { top:5%; width:78px; height:24px; animation:skyDrift 50s linear infinite; animation-delay:-33s; opacity:.85; }
  .sc6::before { width:36px; height:36px; top:-17px; left:12px; }
  .sc6::after  { width:26px; height:26px; top:-12px; left:42px; }
  .sc7 { top:18%; width:92px; height:28px; animation:skyDrift 68s linear infinite; animation-delay:-8s; opacity:.8; }
  .sc7::before { width:44px; height:44px; top:-20px; left:15px; }
  .sc7::after  { width:30px; height:30px; top:-14px; left:50px; }
  .sc8 { top:37%; width:66px; height:20px; animation:skyDrift 60s linear infinite; animation-delay:-45s; opacity:.72; }
  .sc8::before { width:30px; height:30px; top:-14px; left:10px; }
  .sc8::after  { width:22px; height:22px; top:-10px; left:34px; }
  @keyframes skyDrift { from { transform:translateX(-34vw); } to { transform:translateX(120vw); } }

  /* grass ground with a soft rolling top edge */
  .ground { position:absolute; left:0; right:0; bottom:0; height:20vh; min-height:120px;
    background:linear-gradient(180deg,#8FD957 0%, #6FC23E 45%, #57AC2C 100%); }
  .ground::before { content:""; position:absolute; left:0; right:0; top:-26px; height:52px;
    background:#8FD957; border-radius:50% 50% 0 0 / 100% 100% 0 0; transform:scaleX(1.4); }
  /* simple CSS trees sitting on the grass */
  .tree { position:absolute; bottom:58%; width:108px; height:108px; border-radius:50%;
    background:radial-gradient(circle at 50% 42%,#67C53F,#3F9A27);
    box-shadow:-46px 24px 0 -14px #4FAE30, 46px 24px 0 -14px #4FAE30; }
  .tree::after { content:""; position:absolute; left:50%; top:76%; transform:translateX(-50%);
    width:22px; height:92px; background:linear-gradient(90deg,#9A6433,#7A4E26); border-radius:6px; z-index:-1; }
  .t1 { left:5%;  transform:scale(1.35); }
  .t2 { left:23%; transform:scale(.95); bottom:54%; }
  .t3 { right:8%; transform:scale(1.5); }
  .t4 { right:29%; transform:scale(.85); bottom:52%; }
  @media (prefers-reduced-motion: reduce) { .skyCloud, #bgScene .sun { animation:none; } }
  .cards { display:flex; gap:24px; flex-wrap:wrap; justify-content:center; }
  .card {
    width: min(40vw, 200px); aspect-ratio: 1 / 1.15;
    border:none; border-radius:28px; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
    font-family:inherit; font-size: clamp(22px, 4vw, 34px); font-weight:700; color:#fff;
    box-shadow:0 8px 0 rgba(0,0,0,.18), 0 14px 26px rgba(0,0,0,.15);
    transition: transform .12s;
  }
  .card:active { transform:scale(.94) translateY(4px); box-shadow:0 4px 0 rgba(0,0,0,.18); }
  .card .big { font-size: clamp(60px, 12vw, 104px); line-height:1; }
  .card .face { width:52%; aspect-ratio:1/1; border-radius:50%; object-fit:cover;
    border:4px solid rgba(255,255,255,.85); box-shadow:0 4px 10px rgba(0,0,0,.25); pointer-events:none; }
  .card .sub { font-size: clamp(15px, 2.6vw, 20px); font-weight:400; opacity:.9; }
  .profileHolder { position:relative; display:inline-flex; }
  .editPencil { position:absolute; top:8px; left:8px; width:38px; height:38px; padding:0;
    border:none; border-radius:50%; background:rgba(255,255,255,.95); color:#1D4E7A;
    font-size:18px; line-height:38px; text-align:center; cursor:pointer; z-index:3;
    box-shadow:0 3px 8px rgba(0,0,0,.28); transition:transform .12s; }
  .editPencil:active { transform:scale(.88); }
  .card.ellie { background: linear-gradient(160deg, #FF8AD8, #B388EB); }
  .card.ethan { background: linear-gradient(160deg, #58C26E, #2E9E5B); }
  .card.nova  { background: linear-gradient(160deg, #6C8DFF, #4B3FA8); }
  .card.uni   { background: linear-gradient(160deg, #4DD0E1, #FF8AD8); }
  .card.game  { background: linear-gradient(160deg, #FFA94D, #FF6B6B); }
  .card.add   { background: linear-gradient(160deg, #FFA94D, #FF6B6B); }
  .card.sub   { background: linear-gradient(160deg, #4DABF7, #3B5BDB); }
  .card.eng   { background: linear-gradient(160deg, #F783AC, #D6336C); }
  .card.find  { background: linear-gradient(160deg, #FFB454, #F76707); }

  /* text buttons (about / continue) — M2.6 */
  .textbtn { border:none; background:rgba(255,255,255,.9); color:#1D4E7A; font-family:inherit;
    font-size:clamp(15px,3vw,19px); font-weight:700; border-radius:18px; padding:11px 22px;
    cursor:pointer; box-shadow:0 4px 10px rgba(0,0,0,.14); margin-top:4px; }
  .textbtn:active { transform:translateY(2px); box-shadow:0 2px 6px rgba(0,0,0,.14); }
  .textbtn.continue { background:linear-gradient(160deg,#58C26E,#2E9E5B); color:#fff;
    box-shadow:0 5px 0 #1F7A42; font-size:clamp(16px,3.2vw,20px); margin-top:14px; }
  .textbtn.continue:active { transform:translateY(3px); box-shadow:0 2px 0 #1F7A42; }
  #continueWrap { display:flex; justify-content:center; }

  /* find-game prompt */
  .findprompt { font-size:clamp(30px,7vw,56px); font-weight:800; color:#1D4E7A; direction:rtl;
    text-align:center; text-shadow:0 2px 0 rgba(255,255,255,.7); }
  .ans.findnum { background:linear-gradient(160deg,#FFB454,#F76707); box-shadow:0 7px 0 #C2410C, 0 12px 20px rgba(0,0,0,.18);
    font-size:clamp(40px,9vw,68px); }
  .ans.findnum:active { box-shadow:0 2px 0 #C2410C; }

  /* confidence mission */
  #missionActor { display:none; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  #missionPrompt { font-size:clamp(24px,5.5vw,40px); color:#1D4E7A; }
  #missionOptions { display:flex; gap:clamp(14px,4vw,28px); flex-wrap:wrap; justify-content:center; }
  .card.soon  { background: linear-gradient(160deg, #B8C4CE, #94A3B1); cursor:default; opacity:.75; }
  .card.soon:active { transform:none; box-shadow:0 8px 0 rgba(0,0,0,.18); }

  /* ---------- top bar ---------- */
  #topbar { display:none; z-index:3; padding:10px 14px; align-items:center; gap:10px;
    direction:rtl; justify-content:flex-start; }   /* all badges grouped at the top-right, RTL order */
  #topbar.show { display:flex; }
  .badge { background:rgba(255,255,255,.85); border-radius:18px; padding:8px 14px;
    font-size:18px; font-weight:700; color:#1D4E7A; box-shadow:0 3px 8px rgba(0,0,0,.12);
    display:flex; align-items:center; gap:8px; }
  #stepBadge { background:#FFF1C9; color:#9A6A00; }
  #restartBtn { border:none; background:#FF6B6B; color:#fff; font-family:inherit; font-size:17px;
    font-weight:700; border-radius:18px; padding:9px 14px; cursor:pointer;
    box-shadow:0 4px 0 #C94A4A; }
  #restartBtn:active { transform:translateY(3px); box-shadow:0 1px 0 #C94A4A; }

  /* ---------- play layout ---------- */
  #playWrap { display:none; flex:1; min-height:0; z-index:2; }
  #playWrap.show { display:flex; }
  #ovClimb { z-index:8; transition: background .4s; }
  #climbScene { position:relative; width:min(94vw, 92vh); height:min(70vw, 70vh); }
  #worldName { position:absolute; top:-4px; width:100%; text-align:center; direction:rtl;
    font-size: clamp(24px, 6vmin, 44px); font-weight:800; color:#fff;
    text-shadow:0 3px 8px rgba(0,0,0,.4); z-index:2; }
  #stepNum { position:absolute; top:14%; width:100%; text-align:center; direction:rtl;
    font-size: clamp(40px, 11vmin, 92px); font-weight:800; color:#fff;
    text-shadow:0 4px 0 rgba(0,0,0,.25); z-index:2; }
  #stepNum.pop { animation: numPop .55s ease-out; }
  @keyframes numPop { 0%{transform:scale(.2); opacity:0} 60%{transform:scale(1.15)} 100%{transform:scale(1); opacity:1} }
  #mapSvg { position:absolute; inset:0; width:100%; height:100%; }

  /* between-worlds ship */
  #ovWorld { background: radial-gradient(circle at 50% 40%, #2A1F55, #0C0820); z-index:9; }
  #worldScene { position:relative; width:90vw; height:60vh; display:flex;
    flex-direction:column; align-items:center; justify-content:center; }
  #worldBanner { font-size: clamp(26px, 7vmin, 52px); font-weight:800; color:#fff;
    text-align:center; direction:rtl; text-shadow:0 3px 10px rgba(0,0,0,.5); }
  #worldFromTo { font-size: clamp(40px, 12vmin, 90px); margin-top:14px; }
  #worldShip { font-size: clamp(50px, 16vmin, 120px); animation: shipFly 2.6s ease-in-out forwards; }
  @keyframes shipFly {
    0%   { transform: translateX(-40vw) translateY(10vh) rotate(20deg); opacity:0; }
    25%  { opacity:1; }
    100% { transform: translateX(40vw) translateY(-14vh) rotate(20deg); opacity:1; }
  }
  #gameArea { flex:1; min-width:0; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:14px; padding:6px 10px 14px; }

  #questionCard { background:rgba(255,255,255,.92); border-radius:26px; padding:14px 18px;
    box-shadow:0 8px 22px rgba(29,78,122,.18); display:flex; flex-direction:column;
    align-items:center; gap:8px; max-width:96%; }
  #speakBtn { border:none; background:#4DA3FF; color:#fff; border-radius:50%; width:46px; height:46px;
    font-size:22px; cursor:pointer; box-shadow:0 3px 0 #2F7BD0; }
  #speakBtn:active { transform:translateY(2px); box-shadow:0 1px 0 #2F7BD0; }
  #shapesRow { display:flex; direction:ltr; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center; }
  .group { display:flex; flex-wrap:wrap; justify-content:center; gap:2px; max-width: calc(5 * (var(--es) + 4px)); }
  .group span { font-size: var(--es); line-height:1.15; }
  .op { font-size: clamp(28px, 5vw, 44px); font-weight:800; color:#1D4E7A; }
  .bignum { font-size: clamp(54px, 11vw, 92px); font-weight:800; color:#1D4E7A;
    background:#FFE9A8; border-radius:18px; min-width:1.4em; text-align:center;
    padding:2px 12px; box-shadow:0 4px 0 rgba(0,0,0,.12); }
  .group span.x { position:relative; opacity:.55; }
  .group span.x::after { content:""; position:absolute; left:6%; top:46%; width:88%; height:8%;
    background:#E2574C; border-radius:4px; transform:rotate(-18deg); }
  #digitsRow { direction:ltr; font-size: clamp(34px, 7vw, 56px); font-weight:800; color:#E2574C;
    letter-spacing:2px; }
  #digitsRow b { color:#1D4E7A; }

  #answers { display:flex; gap: clamp(12px, 3vw, 26px); }
  .engword { font-size: clamp(48px, 12vw, 100px); font-weight:800; color:#1D4E7A;
    direction:ltr; letter-spacing:1px; text-shadow:0 3px 0 rgba(255,255,255,.7); }
  .enghint { font-size: clamp(18px, 3.4vw, 26px); color:#1D4E7A; font-weight:700; }
  .ans.engans { width: clamp(86px, 19vw, 140px); height: clamp(86px, 19vw, 140px);
    font-size: clamp(46px, 10vw, 76px); background: linear-gradient(160deg, #F783AC, #D6336C);
    box-shadow:0 7px 0 #A61E4D, 0 12px 20px rgba(0,0,0,.18); }
  .ans.engans:active { box-shadow:0 2px 0 #A61E4D; }
  .ans {
    width: clamp(74px, 16vw, 120px); height: clamp(74px, 16vw, 120px); border-radius:50%;
    border:none; font-family:inherit; font-size: clamp(32px, 7vw, 52px); font-weight:800;
    color:#fff; cursor:pointer; background: linear-gradient(160deg, #4DA3FF, #2F7BD0);
    box-shadow:0 7px 0 #1F5A9E, 0 12px 20px rgba(0,0,0,.18); transition: transform .1s;
  }
  .ans:active { transform:translateY(5px); box-shadow:0 2px 0 #1F5A9E; }
  .ans.off { background:#B8C4CE; box-shadow:0 7px 0 #8E9BA6; pointer-events:none; opacity:.6; }
  .ans.wob { animation: wob .45s; }
  @keyframes wob { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-9px)} 50%{transform:translateX(9px)} 75%{transform:translateX(-6px)} }

  #feedback { min-height:34px; font-size: clamp(19px, 3.6vw, 28px); font-weight:700; color:#1D4E7A; text-align:center; }

  /* ---------- catch mini-game ---------- */
  #ovCatch { background: radial-gradient(circle at 50% 40%, #FFE9A8, #FFC773); z-index:9; }
  #catchScene { position:relative; width:96vw; height:80vh; }
  #catchTitle { position:absolute; top:2%; width:100%; text-align:center; direction:rtl;
    font-size:clamp(24px,6vw,44px); font-weight:800; color:#1D4E7A; text-shadow:0 2px 0 rgba(255,255,255,.7); }
  #catchHint { position:absolute; top:11%; width:100%; text-align:center; direction:ltr;
    font-size:clamp(18px,4vw,30px); letter-spacing:3px; }
  #catchCreature { position:absolute; border:none; background:none; cursor:pointer;
    font-size:clamp(64px,16vw,120px); line-height:1; padding:0; transition:transform .08s;
    left:40%; top:45%; }
  #catchCreature:active { transform:scale(.85); }
  #catchDone { position:absolute; inset:0; display:none; flex-direction:column; align-items:center;
    justify-content:center; gap:6px; pointer-events:none; }
  #catchDone.show { display:flex; animation: pop .4s; }
  #catchDone .caughtCreature { font-size:clamp(90px,22vw,170px); line-height:1;
    filter: drop-shadow(0 8px 14px rgba(0,0,0,.25)); animation: caughtBounce 1.4s ease-in-out infinite; }
  #catchDone .caughtCheck { font-size:clamp(40px,9vw,64px); margin-top:-10px; }
  #catchDone .caughtText { font-size:clamp(24px,6vw,42px); font-weight:800; color:#1D4E7A;
    direction:rtl; text-shadow:0 2px 0 rgba(255,255,255,.7); }
  @keyframes caughtBounce { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-12px) scale(1.05)} }

  /* ---------- evolution mini-game (tap to charge -> morph) ---------- */
  #ovEvolve { z-index:11; }
  #evolveScene { position:relative; width:96vw; height:84vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:22px; }
  #evolveTitle { font-size:clamp(26px,7vw,48px); font-weight:900; color:#fff; direction:rtl;
    text-align:center; text-shadow:0 3px 10px rgba(0,0,0,.4); }
  #evolveCreature { border:none; background:none; cursor:pointer; padding:0;
    width:clamp(150px,44vw,300px); height:clamp(150px,44vw,300px);
    transition:transform .09s ease-out, filter .12s; }
  #evolveCreature:active { transform:scale(1.08); }
  #evolveMeterWrap { width:min(74vw,420px); height:30px; border-radius:18px;
    background:rgba(255,255,255,.35); overflow:hidden; box-shadow:inset 0 2px 6px rgba(0,0,0,.25); }
  #evolveMeter { height:100%; width:0%; border-radius:18px;
    background:linear-gradient(90deg,#FFD93D,#FF8A3D); transition:width .18s ease-out; }
  #evolveHint { font-size:clamp(18px,5vw,30px); font-weight:800; color:#fff; direction:rtl;
    text-shadow:0 2px 8px rgba(0,0,0,.35); min-height:1.2em; }
  /* lifecycle filmstrip: each form lights up, then shades as the next lights (left -> right) */
  #evolveStrip { display:none; direction:ltr; align-items:center; justify-content:center;
    gap:clamp(3px,1.4vw,12px); flex-wrap:nowrap; width:100%; }
  .evoCell { flex:0 1 auto; width:clamp(46px,12vw,120px); height:clamp(46px,12vw,120px);
    opacity:.28; transform:scale(.8); filter:grayscale(.75) brightness(.7);
    transition:opacity .22s ease, transform .22s ease, filter .22s ease; }
  .evoCell.trans { width:clamp(38px,9.5vw,96px); height:clamp(38px,9.5vw,96px); }
  .evoCell img { width:100%; height:100%; object-fit:contain; }
  .evoCell.done { opacity:.5; transform:scale(.9); filter:grayscale(.45) brightness(.85); }
  .evoCell.lit { opacity:1; transform:scale(1.14);
    filter:drop-shadow(0 0 18px #FFE9A8) brightness(1.18); }

  /* ---------- collection ---------- */
  #collectionPanel { max-width:92%; }
  #collectionGrid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin:6px 0; }
  .collSlot { width:clamp(72px,20vw,110px); aspect-ratio:1; border-radius:20px;
    background:#F0F4F8; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    box-shadow:inset 0 2px 6px rgba(0,0,0,.08); }
  .collSlot .cre { font-size:clamp(34px,9vw,56px); filter:grayscale(1) opacity(.25); }
  .collSlot.has .cre { filter:none; }
  .collSlot.justgot { animation: gotpop .7s ease-out; }
  @keyframes gotpop { 0%{transform:scale(.3);opacity:0} 55%{transform:scale(1.25)} 100%{transform:scale(1)} }
  .collSlot .cname { font-size:clamp(10px,2.4vw,14px); font-weight:700; color:#1D4E7A; }
  .collSlot.has .cname { color:#1D4E7A; }
  .collSlot:not(.has) .cname { color:#AAB6C2; }

  /* ---------- about (design rationale) ---------- */
  #scrAbout { z-index:11; }
  #aboutContent { max-width:680px; width:100%; direction:rtl; color:#1D3550; line-height:1.6;
    background:rgba(255,255,255,.92); border-radius:22px; padding:18px 22px;
    box-shadow:0 10px 30px rgba(0,0,0,.18); }
  #aboutContent h2 { font-size:clamp(24px,5vw,34px); color:#1D4E7A; margin:18px 0 6px; }
  #aboutContent h3 { font-size:clamp(19px,4vw,24px); color:#2F6B9E; margin:16px 0 4px; }
  #aboutContent p, #aboutContent li { font-size:clamp(15px,3vw,18px); margin:4px 0; }
  #aboutContent ul { padding-inline-start:22px; }
  #aboutContent .tag { display:inline-block; background:#D6E8FB; color:#1D4E7A; border-radius:10px;
    padding:2px 10px; font-weight:700; font-size:14px; margin:2px 0; }
  #aboutContent table { width:100%; border-collapse:collapse; margin:8px 0; font-size:clamp(14px,2.8vw,17px); }
  #aboutContent td, #aboutContent th { border:1px solid #C5D8EC; padding:6px 8px; text-align:center; }
  #aboutContent th { background:#D6E8FB; }

  /* ---------- overlays ---------- */
  .overlay { position:absolute; inset:0; z-index:10; display:none; align-items:center; justify-content:center;
    background:rgba(20,40,70,.45); backdrop-filter: blur(3px); }
  .overlay.show { display:flex; }
  .panel { background:#fff; border-radius:30px; padding:30px 26px; max-width:86%;
    display:flex; flex-direction:column; align-items:center; gap:16px; text-align:center;
    box-shadow:0 18px 50px rgba(0,0,0,.3); animation: pop .35s; }
  @keyframes pop { from{transform:scale(.7); opacity:0} to{transform:scale(1); opacity:1} }
  .panel .huge { font-size:84px; line-height:1; }
  .panel h2 { font-size: clamp(24px, 5vw, 38px); color:#1D4E7A; }
  .panel p { font-size:19px; color:#456; }
  .pbtn { border:none; border-radius:20px; font-family:inherit; font-size:22px; font-weight:700;
    color:#fff; padding:14px 26px; cursor:pointer; background:linear-gradient(160deg,#58C26E,#2E9E5B);
    box-shadow:0 5px 0 #1F7A42; }
  .pbtn:active { transform:translateY(3px); box-shadow:0 2px 0 #1F7A42; }
  .pbtn.red { background:linear-gradient(160deg,#FF8A80,#E2574C); box-shadow:0 5px 0 #B03A31; }
  .pbtn.red:active { box-shadow:0 2px 0 #B03A31; }
  .pbtn.blue { background:linear-gradient(160deg,#4DA3FF,#2F7BD0); box-shadow:0 5px 0 #1F5A9E; }
  .pbtn.blue:active { box-shadow:0 2px 0 #1F5A9E; }
  .btnRow { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }

  /* ---------- confetti ---------- */
  .cf { position:absolute; top:-20px; width:12px; height:12px; z-index:9; border-radius:3px;
    animation: fall linear forwards; }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

  /* ---------- character art adapter (swappable: emoji now, image/sprite later) ---------- */
  .charArt { line-height:1; display:inline-flex; align-items:center; justify-content:center;
    background-size:contain; background-repeat:no-repeat; background-position:center; }
  .charArt.evolving { animation: evolvePop 1.12s ease-in-out; }
  @keyframes evolvePop {
    0%   { transform:scale(1); filter:none; }
    35%  { transform:scale(1.35) rotate(-6deg); filter:drop-shadow(0 0 22px #FFD93D) brightness(1.4); }
    65%  { transform:scale(1.35) rotate(6deg);  filter:drop-shadow(0 0 34px #FFF6) brightness(1.6); }
    100% { transform:scale(1); filter:none; }
  }

  /* ---------- run header: character + XP bar (the visible incentive) ---------- */
  #runHeader { display:flex; align-items:center; gap:12px; width:min(94vw,520px);
    background:rgba(255,255,255,.9); border-radius:22px; padding:8px 14px;
    box-shadow:0 6px 16px rgba(29,78,122,.16); }
  #runCharArt { font-size:clamp(40px,9vw,60px); width:1.3em; height:1.3em; flex:0 0 auto; }
  .runInfo { position:relative; flex:1; min-width:0; display:flex; flex-direction:column; gap:5px; }
  .xpBar { position:relative; height:24px; border-radius:14px; background:#E2ECF5; overflow:hidden;
    box-shadow:inset 0 2px 5px rgba(0,0,0,.12); transition:transform .2s, box-shadow .2s; }
  .xpBar.gain { animation: xpBarPulse .75s ease-out; }
  @keyframes xpBarPulse {
    0%   { transform:scale(1); box-shadow:inset 0 2px 5px rgba(0,0,0,.12); }
    35%  { transform:scale(1.06); box-shadow:0 0 0 3px var(--xp-gain, #FFD43B), 0 0 20px var(--xp-gain, #58C26E), inset 0 2px 5px rgba(0,0,0,.08); }
    100% { transform:scale(1); box-shadow:inset 0 2px 5px rgba(0,0,0,.12); } }
  .xpFill { position:absolute; inset:0 auto 0 0; width:0%;
    background:linear-gradient(90deg,#58C26E,#2E9E5B); border-radius:14px;
    transition: width .65s cubic-bezier(.2,.8,.2,1); }
  .xpFill.gain { animation: xpFillShine .75s ease-out; }
  @keyframes xpFillShine {
    0%   { filter:brightness(1); }
    40%  { filter:brightness(1.35); }
    100% { filter:brightness(1); } }
  .xpText { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:800; color:#1D4E7A; direction:rtl; transition:transform .2s; }
  .xpText.tick { animation: xpTextPop .45s ease-out; }
  @keyframes xpTextPop {
    0%   { transform:scale(1); }
    40%  { transform:scale(1.22); color:#2E9E5B; }
    100% { transform:scale(1); } }
  .xpFloat { position:absolute; left:50%; bottom:2px; pointer-events:none; z-index:6;
    display:inline-flex; align-items:center; gap:4px; padding:6px 14px; border-radius:999px;
    font-size:clamp(26px,6.5vw,38px); font-weight:900; line-height:1; white-space:nowrap;
    background:linear-gradient(180deg,#fff 0%,#FFF8E1 100%);
    border:3px solid currentColor;
    box-shadow:0 6px 0 rgba(0,0,0,.12), 0 10px 28px rgba(0,0,0,.22);
    animation: xpFloatUp 1.35s cubic-bezier(.2,.9,.2,1) forwards; }
  .xpFloat .xpStar { font-size:.85em; line-height:1; }
  .xpFloat.med  { font-size:clamp(30px,7vw,44px); padding:7px 16px; }
  .xpFloat.big  { font-size:clamp(34px,8vw,50px); padding:8px 18px; border-width:4px; }
  @keyframes xpFloatUp {
    0%   { opacity:0; transform:translate(-50%, 20%) scale(.35); }
    18%  { opacity:1; transform:translate(-50%, -55%) scale(1.18); }
    45%  { opacity:1; transform:translate(-50%, -95%) scale(1); }
    100% { opacity:0; transform:translate(-50%, -175%) scale(.95); } }
  .runName { font-size:clamp(15px,3vw,20px); font-weight:800; color:#1D4E7A; direction:rtl;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* ---------- character picker ---------- */
  #charSection, #gameSection { display:none; flex-direction:column; align-items:center; gap:42px;
    width:100%; }
  #charSection.show, #gameSection.show { display:flex; }
  /* small "about" chip in the top-right corner — subtle so kids don't tap it by mistake */
  #scrProfiles #aboutBtn { position:fixed; top:10px; right:12px; z-index:5; margin:0;
    padding:5px 12px; border-radius:16px; font-size:13px; font-weight:700;
    background:rgba(255,255,255,.55); color:#1D4E7A; opacity:.65;
    box-shadow:0 2px 6px rgba(0,0,0,.12); }
  #scrProfiles #aboutBtn:active { transform:scale(.92); }
  #gamePlay { position:relative; z-index:3; margin:0; font-size:27px; padding:17px 46px;
    background:linear-gradient(160deg,#FFB23E,#F77F1B);
    box-shadow:0 6px 0 #C75E07, 0 10px 22px rgba(0,0,0,.22), 0 0 0 5px rgba(255,255,255,.75); }
  #gamePlay:active { transform:translateY(3px);
    box-shadow:0 3px 0 #C75E07, 0 6px 14px rgba(0,0,0,.22), 0 0 0 5px rgba(255,255,255,.75); }
  #gamePlay:disabled { opacity:.45; filter:grayscale(.4); cursor:default; }
  .card.selp { outline:4px solid #2E9E5B; outline-offset:2px; }

  /* players, animals, and games share one grid + card size on the merged screen */
  #profileCards, .charGrid, #gameCardsHome { display:grid;
    grid-template-columns:repeat(auto-fill, minmax(132px,1fr));
    gap:14px; width:min(94vw,620px); justify-items:stretch; }
  #profileCards .profileHolder { display:flex; width:100%; }
  #profileCards .card, #gameCardsHome .card {
    width:100%; aspect-ratio:1/1.12; border-radius:20px; gap:6px; margin:0;
    font-size:clamp(15px,3vw,20px);
    box-shadow:0 5px 0 rgba(0,0,0,.12), 0 9px 18px rgba(0,0,0,.12); }
  #profileCards .card .big, #gameCardsHome .card .big { font-size:clamp(46px,12vw,72px); }
  #profileCards .card .face { width:58%; border-width:4px; }
  #profileCards .editPencil { width:32px; height:32px; line-height:32px; font-size:15px; top:6px; left:6px; }
  .card.addProfile { background:rgba(255,255,255,.6); color:#2F6B9E; border:3px dashed #9BB7D4;
    box-shadow:none; font-weight:800; }

  .charCard { position:relative; border:none; border-radius:20px; cursor:pointer; padding:12px 8px;
    aspect-ratio:1/1.12; justify-content:center;
    display:flex; flex-direction:column; align-items:center; gap:5px; font-family:inherit;
    background:#fff; box-shadow:0 5px 0 rgba(0,0,0,.10), 0 9px 18px rgba(0,0,0,.10);
    transition:transform .12s; }
  .charCard.picked { outline:3px solid #2E9E5B; outline-offset:2px; }
  .charCard.picked::after { content:"✓"; position:absolute; top:4px; left:5px;
    width:22px; height:22px; border-radius:50%; background:#2E9E5B; color:#fff;
    font-size:14px; font-weight:900; display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,.25); }
  .charCard:active { transform:scale(.95) translateY(3px); }
  .charCard .cArt { width:clamp(76px,20vw,104px); height:clamp(76px,20vw,104px);
    display:inline-flex; align-items:center; justify-content:center;
    font-size:clamp(52px,13vw,76px); line-height:1; }
  .charCard .cName { font-size:clamp(15px,3vw,19px); font-weight:800; color:#1D4E7A; }
  .charCard.locked { filter:grayscale(1) opacity(.55); cursor:default; }
  .charCard.locked .cArt { filter:blur(1px); }

  /* ---------- white cards (main screen) ---------- */
  #profileCards .card:not(.addProfile), .charCard, #gameCardsHome .card {
    background:#fff; color:#1D4E7A; border-radius:24px;
    box-shadow:0 6px 0 rgba(60,90,120,.10), 0 12px 22px rgba(60,90,120,.14); }
  #profileCards .card:not(.addProfile) .sub, #gameCardsHome .card .sub { color:#3E6E96; opacity:.9; }
  #profileCards .card:not(.addProfile) .face { border-color:#CDE7FB; }

  /* ---------- profile editor form ---------- */
  .formCard { background:rgba(255,255,255,.95); border-radius:24px; padding:18px 18px 22px;
    width:min(94vw,520px); display:flex; flex-direction:column; gap:8px;
    box-shadow:0 10px 26px rgba(29,78,122,.16); direction:rtl; }
  .flabel { font-size:clamp(15px,3vw,18px); font-weight:800; color:#2F6B9E; margin-top:8px; }
  .finput { font-family:inherit; font-size:20px; padding:10px 14px; border:2px solid #C5D8EC;
    border-radius:14px; color:#1D3550; background:#fff; }
  .finput:focus { outline:none; border-color:#4DA3FF; }
  .avatarGrid { display:flex; flex-wrap:wrap; gap:8px; }
  .avatarOpt { width:54px; height:54px; border-radius:50%; border:3px solid transparent;
    background:#F0F4F8; font-size:30px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; overflow:hidden; padding:0; }
  .avatarOpt img { width:100%; height:100%; object-fit:cover; }
  .avatarOpt.sel { border-color:#2E9E5B; box-shadow:0 0 0 3px rgba(46,158,91,.25); }
  .seg { display:flex; gap:6px; flex-wrap:wrap; }
  .segBtn { font-family:inherit; font-size:15px; font-weight:700; padding:8px 14px; border:none;
    border-radius:12px; background:#E2ECF5; color:#1D4E7A; cursor:pointer; }
  .segBtn.sel { background:linear-gradient(160deg,#4DA3FF,#2F7BD0); color:#fff; }
  .gameRow { display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    padding:8px 0; border-top:1px solid #E2ECF5; }
  .gameRow .gName { font-size:16px; font-weight:800; color:#1D4E7A; flex:1; }
  .gameRow .seg.dim { opacity:.4; pointer-events:none; }
  .advForm { font-size:14px; font-weight:700; color:#2F6B9E; white-space:nowrap; }

  /* ---------- topbar buttons ---------- */
  .topbtn { border:none; background:rgba(255,255,255,.9); color:#1D4E7A; font-family:inherit;
    font-size:15px; font-weight:700; border-radius:16px; padding:8px 12px; cursor:pointer;
    box-shadow:0 3px 8px rgba(0,0,0,.12); }
  .topbtn:active { transform:translateY(2px); }

  @media (max-height: 520px) {
    #questionCard { padding:8px 12px; } #gameArea { gap:8px; }
    #runHeader { padding:5px 10px; }
  }
</style>
</head>
<body>
  <!-- top bar -->
  <div id="topbar">
    <div class="badge" id="profileBadge"></div>
    <div class="badge" id="charBadge"></div>
    <button class="topbtn" id="swapGameBtn">🔁 משחק</button>
    <div class="badge" id="stepBadge"></div>
    <button class="topbtn" id="homeBtn">🏠</button>
  </div>

  <!-- shared decorative scene behind every screen: sun, rainbow, clouds, grass, trees -->
  <div id="bgScene" aria-hidden="true">
    <span class="rainbow"></span>
    <span class="sun"></span>
    <span class="skyCloud sc1"></span>
    <span class="skyCloud sc2"></span>
    <span class="skyCloud sc3"></span>
    <span class="skyCloud sc4"></span>
    <span class="skyCloud sc5"></span>
    <span class="skyCloud sc6"></span>
    <span class="skyCloud sc7"></span>
    <span class="skyCloud sc8"></span>
    <div class="ground">
      <span class="tree t1"></span>
      <span class="tree t2"></span>
      <span class="tree t3"></span>
      <span class="tree t4"></span>
    </div>
  </div>

  <!-- profile select -->
  <div class="screen scroll active" id="scrProfiles">
    <button class="textbtn" id="aboutBtn" title="אודות המשחק" aria-label="אודות המשחק">ℹ️ אודות</button>

    <div class="brandWrap">
      <span class="brand">Alufim</span>
    </div>
    <div class="cards" id="profileCards"></div>

    <!-- animals appear here once a player is chosen -->
    <div id="charSection">
      <div class="charGrid" id="charGrid"></div>
    </div>

    <!-- games appear here once an animal is chosen -->
    <div id="gameSection">
      <div class="cards" id="gameCardsHome"></div>
      <button class="pbtn" id="gamePlay" disabled>שחקו 🎮</button>
    </div>
  </div>

  <!-- profile create / edit -->
  <div class="screen scroll" id="scrProfileEdit">
    <h1 id="profileEditTitle" style="font-size:clamp(24px,5vw,38px)">פרופיל חדש</h1>
    <div class="formCard">
      <label class="flabel">שם</label>
      <input id="profileName" class="finput" type="text" maxlength="12" placeholder="שם הילד/ה">
      <label class="flabel">תמונה</label>
      <div class="avatarGrid" id="avatarGrid"></div>
      <label class="flabel">קצב (לפי גיל)</label>
      <div class="seg" id="rhythmSeg"></div>
      <label class="flabel">משחקים ורמת קושי</label>
      <div id="gameRows"></div>
      <div id="advSection" style="display:none">
        <label class="flabel">מתקדם — XP של חיות (שחזור התקדמות)</label>
        <div id="advChars"></div>
      </div>
    </div>
    <div class="btnRow">
      <button class="pbtn" id="profileSave">שמור</button>
      <button class="pbtn blue" id="profileCancel">ביטול</button>
      <button class="pbtn red" id="profileDelete" style="display:none">מחק</button>
    </div>
  </div>

  <!-- game select (cards rendered dynamically from GAMES) -->
  <div class="screen" id="scrGame">
    <h1 id="gameHello"></h1>
    <h1 style="font-size:clamp(22px,4vw,34px)">במה נשחק היום?</h1>
    <div class="cards" id="gameCards"></div>
    <button class="textbtn" id="gameBack">⬅️ חיות</button>
  </div>

  <!-- play -->
  <div id="playWrap">
    <div id="gameArea">
      <div id="runHeader">
        <div class="charArt" id="runCharArt"></div>
        <div class="runInfo">
          <div class="runName" id="runCharName"></div>
          <div class="xpBar" id="xpBar"><div class="xpFill" id="xpFill"></div><span class="xpText" id="xpText"></span></div>
        </div>
      </div>
      <div id="questionCard">
        <button id="speakBtn">🔊</button>
        <div id="shapesRow"></div>
        <div id="digitsRow"></div>
      </div>
      <div id="answers"></div>
      <div id="feedback"></div>
    </div>
  </div>

  <!-- full-screen climb animation between questions -->
  <div class="overlay" id="ovClimb">
    <div id="climbScene">
      <div id="worldName"></div>
      <div id="stepNum"></div>
      <svg id="mapSvg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
  </div>

  <!-- catch-the-creature mini game -->
  <div class="overlay" id="ovCatch">
    <div id="catchScene">
      <div id="catchTitle"></div>
      <div id="catchHint"></div>
      <button id="catchCreature">🦀</button>
      <div id="catchDone"></div>
    </div>
  </div>

  <!-- evolution mini-game: tap to charge, climax = the transition -->
  <div class="overlay" id="ovEvolve">
    <div id="evolveScene">
      <div id="evolveTitle"></div>
      <button class="charArt" id="evolveCreature"></button>
      <div id="evolveStrip"></div>
      <div id="evolveMeterWrap"><div id="evolveMeter"></div></div>
      <div id="evolveHint"></div>
    </div>
  </div>

  <!-- confidence mission -->
  <div class="overlay" id="ovMission">
    <div class="panel" id="missionPanel">
      <div id="missionActor">⭐</div>
      <h2 id="missionPrompt"></h2>
      <div id="missionOptions"></div>
    </div>
  </div>

  <!-- collection screen (after each catch) -->
  <div class="overlay" id="ovCollection">
    <div class="panel" id="collectionPanel">
      <h2 id="collectionTitle">האוסף שלי</h2>
      <div id="collectionGrid"></div>
      <p id="collectionMsg"></p>
      <div class="btnRow" id="collectionBtns"></div>
    </div>
  </div>

  <!-- final victory (all creatures) -->
  <div class="overlay" id="ovVictory">
    <div class="panel">
      <div class="huge">🏆</div>
      <h2 id="victoryTitle"></h2>
      <p id="victorySub"></p>
      <button class="pbtn" id="victoryRestart">משחק חדש 🔄</button>
    </div>
  </div>

  <!-- restart confirm -->
  <div class="overlay" id="ovRestart">
    <div class="panel">
      <div class="huge">🔄</div>
      <h2>להתחיל מחדש?</h2>
      <div class="btnRow">
        <button class="pbtn red" id="restartYes">כן</button>
        <button class="pbtn" id="restartNo">לא</button>
      </div>
    </div>
  </div>

  <!-- about / design rationale (Hebrew, for the parent/dev) -->
  <div class="screen scroll" id="scrAbout">
    <div id="aboutContent"></div>
    <button class="pbtn blue" id="aboutClose">סגור</button>
  </div>

<script>
"use strict";

/* ============ helpers ============ */
function $(id){ return document.getElementById(id); }
function rnd(n){ return Math.floor(Math.random()*n); }
function pickNoRepeat(arr, lastIdxKey){
  var i;
  do { i = rnd(arr.length); } while (arr.length > 1 && i === LASTIDX[lastIdxKey]);
  LASTIDX[lastIdxKey] = i;
  return arr[i];
}

/* ============ speech ============ */
var hebVoice = null;
var enVoice = null;
function loadVoice(){
  try {
    var vs = speechSynthesis.getVoices();
    var hebs = vs.filter(function(v){ return v.lang && v.lang.indexOf("he") === 0; });
    if (hebs.length){
      hebVoice = hebs.find(function(v){
        return /enhanced|premium|natural|siri/i.test(v.name);
      }) || hebs[0];
    }
    var ens = vs.filter(function(v){ return v.lang && v.lang.indexOf("en") === 0; });
    if (ens.length){
      // prefer a clear US/UK enhanced voice
      enVoice = ens.find(function(v){ return /enhanced|premium|natural|samantha|siri/i.test(v.name) && /en-US|en-GB/i.test(v.lang); })
             || ens.find(function(v){ return /en-US|en-GB/i.test(v.lang); })
             || ens[0];
    }
  } catch(e){}
}
try {
  loadVoice();
  speechSynthesis.onvoiceschanged = loadVoice;
} catch(e){}

function speak(text, queue){
  try {
    if (!queue) speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = "he-IL";
    if (hebVoice) u.voice = hebVoice;
    u.rate = 0.82;   // slower = clearer for kids
    u.pitch = 1.3;   // higher = friendlier, less monotone
    speechSynthesis.speak(u);
  } catch(e){}
}

function speakEn(text, queue){
  try {
    if (!queue) speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    if (enVoice) u.voice = enVoice;
    u.rate = 0.78;   // slow and clear for a learner
    u.pitch = 1.15;
    speechSynthesis.speak(u);
  } catch(e){}
}

/* ============ audio (WebAudio) ============ */
var actx = null;
function audio(){
  if (!actx) {
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  }
  if (actx && actx.state === "suspended") { try { actx.resume(); } catch(e){} }
  return actx;
}
function tone(freq, t0, dur, type, vol){
  var ctx = audio(); if (!ctx) return;
  var o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type || "sine"; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, ctx.currentTime + t0);
  g.gain.exponentialRampToValueAtTime(vol || 0.25, ctx.currentTime + t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + t0 + dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(ctx.currentTime + t0); o.stop(ctx.currentTime + t0 + dur + 0.05);
}
function sCorrect(){
  // sparkly rising arpeggio
  tone(523,0,.15,"triangle",.22); tone(659,.08,.15,"triangle",.22);
  tone(784,.16,.15,"triangle",.22); tone(1046,.24,.3,"triangle",.25);
  tone(1568,.3,.25,"sine",.12); // sparkle on top
}
function sWrong(){
  // gentle cartoon "uh-oh", not harsh
  tone(392,0,.16,"sine",.15); tone(311,.18,.25,"sine",.15);
}
function sSlip(){
  var ctx = audio(); if (!ctx) return;
  var o = ctx.createOscillator(), g = ctx.createGain();
  o.type = "sawtooth";
  o.frequency.setValueAtTime(700, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.6);
  g.gain.setValueAtTime(0.15, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.6);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime + 0.65);
}
function sFanfare(){ tone(523,0,.2); tone(659,.12,.2); tone(784,.24,.2); tone(1046,.36,.45); }
function sXpGain(n){
  // quick reward blip — higher pitch for bigger gains
  var base = 440 + Math.min(n, 7) * 45;
  tone(base, 0, .09, "sine", .16);
  tone(base * 1.26, .08, .11, "triangle", .14);
  if (n >= 4) tone(base * 1.5, .16, .14, "triangle", .12);
  if (n >= 6) tone(base * 1.75, .24, .16, "sine", .1);
}

/* ============ confetti ============ */
var CF_COLORS = ["#FF6B6B","#FFD93D","#6BCB77","#4D96FF","#B388EB","#FF8AD8","#FFA94D"];
function confetti(n){
  n = n || 45;
  for (var i=0;i<n;i++){
    var d = document.createElement("div");
    d.className = "cf";
    d.style.left = rnd(100) + "vw";
    d.style.background = CF_COLORS[rnd(CF_COLORS.length)];
    d.style.animationDuration = (1.4 + Math.random()*1.4) + "s";
    d.style.animationDelay = (Math.random()*0.3) + "s";
    if (rnd(2)) d.style.borderRadius = "50%";
    document.body.appendChild(d);
    (function(el){ setTimeout(function(){ el.remove(); }, 3200); })(d);
  }
}

/* ============ XP gain pop ============ */
// Cool (small) -> warm (big): each +1 step gets visibly hotter.
var XP_GAIN_COLORS = ["#4DABF7", "#38D9A9", "#94D82D", "#FFD43B", "#FF922B", "#FF6B6B", "#E03131"];
function xpGainColor(amount){
  var n = Math.max(1, amount || 1);
  return XP_GAIN_COLORS[Math.min(n, XP_GAIN_COLORS.length) - 1];
}
// Floats a colored "⭐ +N" badge up from the XP bar — the main reward moment.
function floatXpGain(amount){
  if (!amount) return;
  var host = document.querySelector(".runInfo");
  var bar = $("xpBar"), fill = $("xpFill"), txt = $("xpText");
  if (!host) return;
  var color = xpGainColor(amount);
  var s = document.createElement("span");
  s.className = "xpFloat" + (amount >= 6 ? " big" : amount >= 4 ? " med" : "");
  s.style.color = color;
  s.style.borderColor = color;
  // badge fill also warms up on bigger gains
  if (amount >= 5) s.style.background = "linear-gradient(180deg,#fff 0%,#FFF3BF 100%)";
  else if (amount >= 3) s.style.background = "linear-gradient(180deg,#fff 0%,#FFF9DB 100%)";
  s.innerHTML = "<span class='xpStar'>⭐</span>+" + amount;
  host.appendChild(s);
  if (bar){
    bar.style.setProperty("--xp-gain", color);
    bar.classList.remove("gain"); void bar.offsetWidth; bar.classList.add("gain");
  }
  if (fill){ fill.classList.remove("gain"); void fill.offsetWidth; fill.classList.add("gain"); }
  if (txt){ txt.classList.remove("tick"); void txt.offsetWidth; txt.classList.add("tick"); }
  sXpGain(amount);
  setTimeout(function(){ s.remove(); }, 1400);
  setTimeout(function(){
    if (bar) bar.classList.remove("gain");
    if (fill) fill.classList.remove("gain");
    if (txt) txt.classList.remove("tick");
  }, 800);
}

/* ---- Character art adapter: a form is a DESCRIPTOR, not a raw emoji ----
   Emoji today; swap to {type:"image",src} or sprites later with zero engine
   changes — every place that shows a character calls renderCharacterArt(). */
function normArt(a){ return (typeof a === "string") ? { type:"emoji", value:a } : a; }
/* Asset resolver: returns an inlined data URI when running as the offline
   standalone build (window.__A map injected), else the normal relative path. */
function A(p){ return (window.__A && window.__A[p]) || p; }
function charArt(id, stage, fallback){
  return { type:"image", src:A("assets/characters/"+id+"/"+id+"-"+stage+".png"), fallback:fallback };
}
function transitionArtFor(charId, fromFormIdx){
  var keys = ["t12","t23","t34"];
  if (fromFormIdx < 0 || fromFormIdx > 2) return null;
  return { type:"image", src:A("assets/characters/"+charId+"/"+charId+"-"+keys[fromFormIdx]+".png"), fallback:"✨" };
}
function renderCharacterArt(art, elm){
  art = normArt(art);
  elm.innerHTML = "";
  elm.style.backgroundImage = "";
  elm.style.background = "transparent";
  elm.style.borderRadius = "";
  if (art.type === "image"){
    var img = document.createElement("img");
    img.src = art.src;
    img.alt = "";
    img.style.width = "100%";
    img.style.height = "100%";
    img.style.objectFit = "contain";
    img.onerror = function(){
      elm.textContent = art.fallback || "🙂";
    };
    elm.appendChild(img);
  } else {
    elm.textContent = art.value;
  }
  return elm;
}

/* ---- XP: fully data-driven, table lookup by [level][tier][accuracy] ----
   XP is its OWN currency; a character's form is derived ONLY from cumulative XP. */
var XP_BATCH_SIZE = 8;                  // steps per XP tier (adjust to reshape the difficulty curve)
// Per-correct XP. Each row is a tier; cells are [2+ wrong, 1 wrong, perfect].
// Edit any cell to retune; add a row for more tiers, add leading cells for finer accuracy buckets.
var XP_TABLE = {
  easy:   [[1, 2, 3], [1, 2, 4], [1, 2, 5]],
  medium: [[1, 2, 4], [1, 2, 5], [1, 2, 6]],
  hard:   [[1, 2, 5], [1, 2, 6], [1, 2, 7]]
};
var XP_BEAT = { mission:1, play:3 };   // flat, guaranteed XP for rhythm beats
var FORM_XP_STEP = 70;                 // TODO: testing value (was 100) — restore before release. Progressive: thresholds are 1*STEP, 3*STEP, 6*STEP, ...
function blockForStep(stepIndex){ return Math.floor((stepIndex - 1) / 4); } // questions: steps 1-4 -> block 0
function xpTier(level, stepIndex){
  var rows = (XP_TABLE[level] || XP_TABLE.easy).length;
  return Math.min(rows - 1, Math.max(0, Math.floor((stepIndex - 1) / XP_BATCH_SIZE)));
}
function xpForCorrect(level, stepIndex, mistakes){
  var row = (XP_TABLE[level] || XP_TABLE.easy)[xpTier(level, stepIndex)];
  // row is [worst ... perfect]; perfect is the last cell, each mistake steps one cell left.
  var idx = Math.max(0, (row.length - 1) - (mistakes || 0));
  return row[idx];
}
// Cumulative form thresholds: constant increment -> [0,100,200,300,...]; extends to any form count.
// Progressive thresholds: each evolution costs more than the last.
// Cumulative XP to reach form f = STEP*(1+2+...+f). With STEP=100 -> 0,100,300,600,1000,...
function formThresholds(formCount){
  var arr = [0], acc = 0;
  for (var s = 1; s < formCount; s++){ acc += FORM_XP_STEP * s; arr.push(acc); }
  return arr;
}
function formForXp(totalXp, formCount){
  var th = formThresholds(formCount), f = 0;
  for (var i = 0; i < th.length; i++){ if (totalXp >= th[i]) f = i; }
  return f;
}

// Which beat (if any) fires AFTER completing learning step `stepIndex`.
// Conflict rule: when two intervals coincide, the LARGER interval wins.
function buildBeat(preset, stepIndex){
  var chosen = "learn", chosenEvery = 0;
  (preset.beats || []).forEach(function(b){
    if (stepIndex % b.every === 0 && b.every > chosenEvery){ chosen = b.type; chosenEvery = b.every; }

}

}

/* ============ confidence missions (every-2) — large varied pool ============ */
// This beat fires very often, so it must NOT repeat. We draw a target from a big
// pool (~130 items: all VOCAB words + find packs), randomize the phrasing, and add
// a sprinkle of "feed the pet" missions for the nurture angle. Pool is built lazily
// because FIND_PACKS/FIND_CATS are declared further down.
var MISSION_PHRASES = ["מצאו את ה", "איפה ה", "לחצו על ה", "תמצאו את ה"];
var MISSION_SUCCESS = ["יש! מצאת!", "כל הכבוד!", "יופי, נכון!", "מצוין!", "וואו!", "בדיוק!"];
var _missionPool = null;
function missionPool(){
  if (_missionPool) return _missionPool;
  var pool = [], seen = {};
  function add(he, emoji){ if (emoji && he && !seen[emoji]){ seen[emoji] = true; pool.push({ he:he, emoji:emoji }); } }
  VOCAB_ORDER.forEach(function(t){ VOCAB[t].words.forEach(function(w){ add(w.he, w.emoji); }); });
  FIND_CATS.forEach(function(cat){ FIND_PACKS[cat].forEach(function(it){ add(it.he, it.emoji); }); });
  _missionPool = pool;
  return pool;
}
// Returns a fresh, mostly-random confidence mission { prompt, say, target, options, actor, success }.
function nextMission(){
  var c = run.character;
  var pool = missionPool();
  if (rnd(5) === 0){   // ~1 in 5 = nurture: feed the pet its food
    var others = shuffle(pool.filter(function(it){ return it.emoji !== c.food; }));
    return {
      target:c.food,
      options:shuffle([c.food, others[0].emoji, others[1].emoji]),
      prompt:"האכילו את ה" + c.he + "!",
      say:"האכילו את ה" + c.he + "!",
      success:"יש! ה" + c.he + " אכל!",
      actor:currentFormArt()
    };
  }
  var item = pool[rnd(pool.length)];
  var rest = shuffle(pool.filter(function(it){ return it.emoji !== item.emoji; }));
  var ph = MISSION_PHRASES[rnd(MISSION_PHRASES.length)];
  var prompt = (ph.indexOf("איפה") === 0) ? (ph + item.he + "?") : (ph + item.he + "!");
  return {
    target:item.emoji,
    options:shuffle([item.emoji, rest[0].emoji, rest[1].emoji]),
    prompt:prompt,
    say:prompt,
    success:MISSION_SUCCESS[rnd(MISSION_SUCCESS.length)],
    actor:currentFormArt()
  };
}

/* ============ adaptive difficulty nudge (optional, around the profile baseline) ============ */
// The profile sets the baseline level per game. We keep the old "last 2 answers"
// signal as a gentle one-notch nudge (clamped), so a struggling kid eases down
// without ever losing the configured level. Never escalates above the baseline.
var LEVELS = ["easy","medium","hard"];
function effectiveLevel(baseLevel, recent){
  var i = LEVELS.indexOf(baseLevel); if (i < 0) i = 0;
  var last2 = (recent || []).slice(-2);
  if (last2.length === 2){
    var failures = last2.filter(function(q){ return q.hadWrongAttempt; }).length;
    if (failures === 2) i = Math.max(0, i - 1);   // both wrong -> one notch easier
  }
  return LEVELS[i];
}

/* ============ shared render helpers ============ */
function emojiSize(maxGroup){
  if (maxGroup <= 5) return 52;
  if (maxGroup <= 8) return 44;
  if (maxGroup <= 12) return 36;
  return 30;
}
function makeGroup(em, n, cross){
  var g = document.createElement("div"); g.className = "group";
  for (var i=0;i<n;i++){
    var sp = document.createElement("span"); sp.textContent = em;
    if (cross && i >= (n - cross)) sp.className = "x";
    g.appendChild(sp);
  }
  return g;
}
function bigNumEl(v){ var d=document.createElement("div"); d.className="bignum"; d.textContent=v; return d; }
function opSignEl(t){ var o=document.createElement("div"); o.className="op"; o.textContent=t; return o; }
function renderChoiceButtons(options, valueOf, labelOf, cls){
  var ansEl = $("answers"); ansEl.innerHTML = "";
  options.forEach(function(opt){
    var b = document.createElement("button");
    b.className = "ans" + (cls ? " " + cls : "");
    b.textContent = labelOf(opt);
    var val = valueOf(opt);
    b.addEventListener("click", function(){ onAnswer(val, b); });
    ansEl.appendChild(b);
  });
}
function shuffle(arr){ for (var i=arr.length-1;i>0;i--){ var j=rnd(i+1), t=arr[i]; arr[i]=arr[j]; arr[j]=t; } return arr; }
function numberOptions(answer, maxNum){
  var opts = [answer], tries = 0;
  while (opts.length < 3 && tries < 80){
    tries++;
    var delta = 1 + rnd(2);
    var v = answer + (rnd(2) ? delta : -delta);
    if (v >= 1 && v <= maxNum && opts.indexOf(v) === -1) opts.push(v);
  }
  var pad = 1;
  while (opts.length < 3){ var c = answer + pad; if (c>=1 && c<=maxNum && opts.indexOf(c)===-1) opts.push(c); pad = (pad>0?-pad:(-pad+1)); if (pad>maxNum) break; }
  while (opts.length < 3) opts.push(answer);
  return shuffle(opts);
}

        a = 1 + rnd(sum - 1);                          // 1..sum-1

      var wb = document.createElement("div"); wb.className = "engword"; wb.textContent = q.word.en;
      row.appendChild(wb);
      $("digitsRow").innerHTML = "<span class='enghint'>איזה אחד זה?</span>";
      renderChoiceButtons(q.options, function(o){return o.emoji;}, function(o){return o.emoji;}, "engans");
    },
    speakPrompt: function(q){ speakEn(q.word.en, true); }
  },

  find: {
    generate: function(ctx){
      var maxNum = diffParams("find", ctx.level, ctx.step).maxNum || 5;
      var doNumber = (rnd(2) === 0);
      if (doNumber){
        var pool = [];
        for (var n=1; n<=maxNum; n++){ if (ctx.usedKeys.indexOf("find:num:"+n) === -1) pool.push(n); }
        if (pool.length){
          var target = pool[rnd(pool.length)];
          return { op:"find", kind:"num", answer:target, maxNum:maxNum };
        }
      }
      var cat = FIND_CATS[rnd(FIND_CATS.length)];
      var pack = FIND_PACKS[cat];
      var availItems = pack.filter(function(it){ return ctx.usedKeys.indexOf("find:cat:"+it.emoji) === -1; });
      if (!availItems.length) availItems = pack;
      var item = availItems[rnd(availItems.length)];
      var distractors = [], guard = 0;
      while (distractors.length < 2 && guard < 100){
        guard++;
        var d = pack[rnd(pack.length)];
        if (d.emoji === item.emoji || distractors.indexOf(d) !== -1) continue;
        distractors.push(d);
      }
      var options = shuffle([item].concat(distractors));
      return { op:"find", kind:"cat", cat:cat, item:item, options:options, answer:item.emoji };
    },
    key: function(q){ return q.kind === "num" ? ("find:num:" + q.answer) : ("find:cat:" + q.answer); },
    render: function(q){
      var row = $("shapesRow"); row.innerHTML = "";
      var prompt = document.createElement("div"); prompt.className = "findprompt";
      if (q.kind === "num"){
        prompt.textContent = "מצאו את המספר " + q.answer;
        row.appendChild(prompt);
        $("digitsRow").innerHTML = "<span class='enghint'>👆</span>";
        renderChoiceButtons(numberOptions(q.answer, q.maxNum), function(v){return v;}, function(v){return v;}, "findnum");
      } else {
        prompt.textContent = findCatLabel(q.cat, q.item.he);
        row.appendChild(prompt);
        $("digitsRow").innerHTML = "<span class='enghint'>👆</span>";
        renderChoiceButtons(q.options, function(o){return o.emoji;}, function(o){return o.emoji;}, "engans");
      }
    },
    speakPrompt: function(q){
      if (q.kind === "num") speak("לחצו על המספר " + HEB_NUM[q.answer] + "!", true);
      else speak(findCatLabel(q.cat, q.item.he), true);
    }
  }
};

/* ============ GAMES registry — data-driven cards ============ */
var GAMES = {
  add:  { title:"חיבור",  icon:"➕",  subtitle:"לחבר מספרים",        cardClass:"add",  provider:PROVIDERS.add },
  sub:  { title:"חיסור",  icon:"➖",  subtitle:"להוריד מספרים",       cardClass:"sub",  provider:PROVIDERS.sub },
  eng:  { title:"אנגלית", icon:"🔤", subtitle:"מילים באנגלית",       cardClass:"eng",  provider:PROVIDERS.eng },
  find: { title:"מצא את...", icon:"🔍", subtitle:"מספרים, צבעים וצורות", cardClass:"find", provider:PROVIDERS.find }
};
var GAME_ORDER = ["add","find","eng","sub"];
function provider(){ return GAMES[run.gameId].provider; }
function levelLabel(l){ return l === "hard" ? "קשה" : (l === "medium" ? "בינוני" : "קל"); }

/* ============ context passed to providers ============ */
function buildContext(){
  return {
    gameId:  run.gameId,
    level:   effectiveLevel(run.level, run.completed),
    step:    run.step,
    usedKeys: run.usedKeys,
    recent:  run.completed
  };
}

/* ============ active-character progress (durable, lives in profile.characters) ============ */
function activeProg(){
  var id = run.character.id;
  if (!profile.characters[id]) profile.characters[id] = { form:0, totalXp:0 };
  return profile.characters[id];
}
function artText(art){ art = normArt(art); return art.type === "emoji" ? art.value : (art.fallback || "⭐"); }
function currentFormArt(){
  var c = run.character, prog = activeProg();
  var fi = formForXp(prog.totalXp || 0, c.forms.length);   // derived from cumulative XP + thresholds
  return c.forms[Math.min(fi, c.forms.length - 1)];
}
function xpBarState(prog, c){
  var th = formThresholds(c.forms.length);
  var f = formForXp(prog.totalXp, c.forms.length);
  if (f >= c.forms.length - 1){ return { pct:100, label:"בוגר! ✨ (" + prog.totalXp + " XP)" }; }
  var next = th[f + 1];   // absolute cumulative threshold for the next form
  var pct = Math.max(0, Math.min(100, Math.round((prog.totalXp / next) * 100)));
  return { pct:pct, label: prog.totalXp + " / " + next };
}
function updateXpBar(){
  var c = run.character, st = xpBarState(activeProg(), c);
  $("xpFill").style.width = st.pct + "%";
  $("xpText").textContent = st.label;
}
function renderRunHeader(){
  var c = run.character, prog = activeProg();
  renderCharacterArt(currentFormArt(), $("runCharArt"));
  $("runCharName").textContent = c.he;
  $("profileBadge").innerHTML = avatarHTML(profile.avatar, 22) + " " + profile.name;
  $("charBadge").textContent = artText(currentFormArt()) + " " + c.he;
  updateStepBadge();
  updateXpBar();
}
function updateStepBadge(){ $("stepBadge").textContent = "שלב " + (run.step || 1); }

/* ============ XP gain + evolution (forms derived ONLY from cumulative XP) ============ */
function awardXp(amount){
  var c = run.character, prog = activeProg();
  var before = formForXp(prog.totalXp, c.forms.length);
  prog.totalXp += amount;                 // XP never caps
  var after = formForXp(prog.totalXp, c.forms.length);
  prog.form = after;
  saveState();                            // autosave after every answer / beat
  updateXpBar();
  floatXpGain(amount);                     // colored "+N" pops up from the XP bar
  $("charBadge").textContent = artText(c.forms[Math.min(after, c.forms.length - 1)]) + " " + c.he;
  if (after > before) run.pendingEvolve = after;      // play the evolution mini-game at the next beat
}
// Runs the deferred evolution mini-game (if any) before continuing the flow.
function withEvolution(next){
  if (run.pendingEvolve != null){
    var formIdx = run.pendingEvolve; run.pendingEvolve = null;
    startEvolveGame(formIdx, next);
  } else if (next){ next(); }
}
// Tap-to-charge mini-game; when the meter fills, the creature morphs to its new form.
function startEvolveGame(formIdx, done){
  var c = run.character;
  var myToken = ++animSeq;                            // claim this animation generation
  run.locked = true; run.phase = "evolve";
  var fromArt = c.forms[Math.max(0, formIdx - 1)];
  var toArt   = c.forms[Math.min(formIdx, c.forms.length - 1)];
  var needed = 6, taps = 0;
  var ov = $("ovEvolve"), cre = $("evolveCreature");
  ov.onclick = null; $("evolveMeterWrap").style.display = "";   // reset if a preview ran before
  hideFilmstrip(); cre.style.display = "";
  ov.style.background = "";   // translucent scrim over the current screen (no dedicated bg)
  $("evolveTitle").textContent = "";
  $("evolveHint").textContent = "לחצו שוב ושוב! 👆";
  $("evolveMeter").style.width = "0%";
  cre.className = "charArt"; cre.style.pointerEvents = ""; cre.style.transform = ""; cre.style.filter = "";
  renderCharacterArt(fromArt, cre);
  ov.classList.add("show");
  speak("לחצו כדי להתפתח!");
  cre.onclick = function(){
    if (taps >= needed) return;
    taps++;
    $("evolveMeter").style.width = Math.round(taps / needed * 100) + "%";
    sXpGain(Math.min(7, 2 + taps));                 // rising pitch as it charges
    confetti(8);
    cre.style.transform = "scale(" + (1 + taps * 0.05) + ")";   // grows while powering up
    cre.style.filter = "drop-shadow(0 0 " + (8 + taps * 4) + "px #FFE9A8) brightness(" + (1 + taps * 0.06) + ")";
    if (taps >= needed){
      cre.onclick = null; cre.style.pointerEvents = "none";
      cre.style.transform = ""; cre.style.filter = "";
      cre.style.display = "none";                 // hand off to the filmstrip
      $("evolveHint").textContent = "";
      sFanfare(); confetti(60);
      playFilmstrip(c, formIdx, 360, myToken, function(){
        $("evolveTitle").textContent = "התפתח! ✨";
        confetti(130); sFanfare(); speak(c.cheer);
        setTimeout(function(){ if (myToken === animSeq){ confetti(90); speak(c.cheer); } }, 900);
        setTimeout(function(){ if (myToken === animSeq) confetti(70); }, 1700);
        setTimeout(function(){
          ov.classList.remove("show");
          cre.style.display = "";
          cre.style.background = "transparent";
          cre.style.borderRadius = "";
          hideFilmstrip();
          renderRunHeader();
          if (formIdx >= c.forms.length - 1) unlockNext();   // fully grown -> unlock next animal
          run.phase = "learn";
          if (done) done();
        }, 2600);                                            // linger on the new form (was 1100ms)
      });
    }
  };
}
// Isolated animation hook: swap in a fancier sprite/Lottie morph later by replacing ONLY this.
function playEvolveAnimation(fromArt, toArt, elm, done, fromFormIdx){
  sFanfare(); confetti(70);
  renderCharacterArt(fromArt, elm);
  elm.classList.remove("evolving"); void elm.offsetWidth; elm.classList.add("evolving");
  var trans = (fromFormIdx != null && run.character) ? transitionArtFor(run.character.id, fromFormIdx) : null;
  setTimeout(function(){ renderCharacterArt(trans || toArt, elm); }, 336);
  if (trans) setTimeout(function(){ renderCharacterArt(toArt, elm); }, 704);
  setTimeout(function(){ elm.classList.remove("evolving"); if (done) done(); }, 1160);
}
// Generation token: bumped whenever a new evolve/preview animation starts. Any
// pending timer/callback from an older run checks this and no-ops, so tapping a
// new animal can't clear or play sounds over the new animation (no coupling).
var animSeq = 0;
// Filmstrip morph: render every form in a row and sweep a "spotlight" left->right,
// lighting each form then shading it as the next lights up. Ends lit on uptoIdx.
function playFilmstrip(c, uptoIdx, step, token, done){
  step = step || 300;
  var strip = $("evolveStrip"), cells = [];
  strip.innerHTML = ""; strip.style.display = "flex";
  var pending = 0, started = false;
  function begin(){ if (started || token !== animSeq) return; started = true; lightUp(0); }
  for (var i = 0; i < c.forms.length; i++){
    var cell = document.createElement("div");
    cell.className = "evoCell";
    renderCharacterArt(c.forms[i], cell);
    strip.appendChild(cell); cells.push(cell);
    var img = cell.querySelector("img");
    if (img && !img.complete){
      pending++;
      var onReady = function(){ if (--pending <= 0) begin(); };
      img.addEventListener("load", onReady);
      img.addEventListener("error", onReady);
    }
  }
  function lightUp(i){
    if (token !== animSeq) return;     // a newer animation took over -> stop quietly
    if (i > uptoIdx){ if (done) done(); return; }
    if (i > 0){ cells[i - 1].classList.remove("lit"); cells[i - 1].classList.add("done"); }
    cells[i].classList.add("lit");
    sXpGain(Math.min(7, 3 + i)); confetti(10);
    setTimeout(function(){ lightUp(i + 1); }, step);
  }
  if (pending === 0) begin();          // all cached -> start now
  else setTimeout(begin, 2500);        // safety: never hang if an image stalls
}
function hideFilmstrip(){ var s = $("evolveStrip"); s.style.display = "none"; s.innerHTML = ""; }
function unlockNext(){
  for (var i = 0; i < CHARACTERS.length; i++){
    var nc = CHARACTERS[i];
    if (!profile.characters[nc.id]){
      profile.characters[nc.id] = { form:0, totalXp:0 };
      saveState();
      $("collectionTitle").textContent = "🎉 נפתחה חיה חדשה!";
      $("collectionGrid").innerHTML = "<div style='font-size:90px'>" + artText(nc.forms[0]) + "</div>";
      $("collectionMsg").textContent = nc.he + " מחכה לך במסך החיות!";
      $("collectionBtns").innerHTML = "";
      $("ovCollection").classList.add("show");
      speak("נפתחה חיה חדשה!");
      setTimeout(function(){ $("ovCollection").classList.remove("show"); }, 3000);
      return;
    }
  }
}

/* ============ shared question lifecycle ============ */
function makeQuestion(speakNow){
  var p = provider();
  var q = p.generate(buildContext());
  run.current = q;
  run.currentKey = p.key(q);
  run.hadWrong = false;
  run.mistakes = 0;
  run.phase = "learn";
  updateStepBadge();
  p.render(q);
  $("feedback").textContent = "";
  run.locked = false;
  if (speakNow) p.speakPrompt(q);
}
function nextQuestion(){ makeQuestion(true); }

/* ============ answer flow ============ */
var PRAISE = ["כל הכבוד!","מעולה!","וואו!","נכון מאוד!","יופי!","מצוין!","אלוף/ה!","מדהים!"];
function onAnswer(v, btn){
  if (run.locked) return;
  audio();
  if (run.phase === "mission"){ onMissionAnswer(v, btn, (v === run.mission.target)); return; }
  var correct = (v === run.current.answer);

  if (correct){
    run.locked = true;
    sCorrect();
    confetti(8);
    if (run.usedKeys.indexOf(run.currentKey) === -1) run.usedKeys.push(run.currentKey);
    run.completed.push({ key:run.currentKey, correct:true, hadWrongAttempt:run.hadWrong });
    var gain = xpForCorrect(buildContext().level, run.step, run.mistakes);  // level x step x accuracy
    awardXp(gain);
    var praise = pickNoRepeat(PRAISE, "praise");
    if (run.gameId === "eng"){
      var w = run.current.word;
      speakEn(w.en); speak(w.he + "! " + praise, true);
      $("feedback").textContent = "🎉 " + w.en + " = " + w.he + "!";
    } else {
      speak(praise);
      $("feedback").textContent = "🎉 " + praise;
    }
    advanceStep();
  } else {
    run.hadWrong = true;
    run.mistakes++;
    btn.classList.add("wob");
    setTimeout(function(){ btn.classList.remove("wob"); }, 500);
    btn.classList.add("off");
    sWrong();
    speak("כמעט! נסו שוב");
    $("feedback").textContent = "💪 כמעט! נסו שוב";
    if (run.mistakes >= 3){
      var btns = document.querySelectorAll(".ans");
      setTimeout(function(){ btns.forEach(function(b){ b.classList.remove("off"); }); }, 700);
      run.mistakes = 0;
    }
  }
}

/* ============ rhythm dispatch: buildBeat -> BEAT_HANDLERS ============ */
function advanceStep(){
  setTimeout(function(){
    // Run the beat first. Any pending evolution is deferred and celebrated at
    // gotoNextStep (i.e. AFTER a mission/play beat), so the form change is the
    // climax rather than something rushed before a 2-step mission.
    var beat = buildBeat(run.preset, run.step);     // beat AFTER finishing this learning step
    (BEAT_HANDLERS[beat] || BEAT_HANDLERS.learn)();
  }, 900);
}
function gotoNextStep(){
  withEvolution(function(){                          // catch evolutions from mission/play beats
    run.step++;
    var roundEdge = run.preset.round && ((run.step - 1) % run.preset.round === 0);
    if (roundEdge) confetti(40);                     // natural mid-session celebration (not a hard stop)
    nextQuestion();
  });
}
var BEAT_HANDLERS = { learn:gotoNextStep, mission:startMission, play:startPlay };

/* ============ confidence mission (every-2): feed the pet ============ */
function startMission(){
  run.locked = true;
  run.phase = "mission";
  var m = nextMission();
  run.mission = m;
  $("missionPrompt").textContent = m.prompt;
  var box = $("missionOptions"); box.innerHTML = "";
  m.options.forEach(function(em){
    var b = document.createElement("button");
    b.className = "ans engans";
    b.textContent = em;
    b.addEventListener("click", function(){ onAnswer(em, b); });
    box.appendChild(b);
  });
  $("ovMission").classList.add("show");
  speak(m.say);
  run.locked = false;                              // mission overlay is tappable
}
function onMissionAnswer(v, btn, correct){
  if (correct){
    run.locked = true;
    sCorrect();
    confetti(20);
    awardXp(XP_BEAT.mission);                       // easy, guaranteed beat XP
    speak(run.mission.success);
    btn.style.transform = "scale(1.3)";
    setTimeout(function(){
      btn.style.transform = "";
      $("ovMission").classList.remove("show");
      run.phase = "learn";
      gotoNextStep();
    }, 1200);
  } else {
    btn.classList.add("wob");
    setTimeout(function(){ btn.classList.remove("wob"); }, 500);
    sWrong();
    speak("כמעט! נסו שוב");
  }
}

/* ============ play/feed mini-game (every-4): the character's signature reward ============ */
function startPlay(){
  run.locked = true;
  run.phase = "play";
  var c = run.character, reward = c.reward;
  var tapsNeeded = Math.min(7, 3 + blockForStep(run.step));   // a touch deeper later in
  var tapsDone = 0;
  $("ovCatch").style.background = "radial-gradient(circle at 50% 40%, " + c.sky + ", " + c.accent + ")";
  $("catchTitle").textContent = reward.title + " " + reward.emoji;
  var btn = $("catchCreature");
  btn.textContent = reward.emoji;
  btn.style.display = ""; btn.style.transform = ""; btn.style.pointerEvents = "";
  function drawProgress(){ var d=""; for (var i=0;i<tapsNeeded;i++){ d += (i < tapsDone) ? "🟢" : "⚪"; } $("catchHint").textContent = d; }
  drawProgress();
  $("ovCatch").classList.add("show");
  speak(reward.title + "!");
  function moveAway(){ btn.style.left = (8 + rnd(74)) + "%"; btn.style.top = (22 + rnd(58)) + "%"; }
  moveAway();
  btn.onclick = function(){
    if (tapsDone >= tapsNeeded) return;
    tapsDone++; drawProgress(); sCorrect(); confetti(14);
    if (tapsDone >= tapsNeeded){
      btn.onclick = null; btn.style.pointerEvents = "none"; btn.style.display = "none";
      sFanfare(); confetti(90);
      awardXp(XP_BEAT.play);                        // growth checkpoint: the pet eats & grows
      $("catchTitle").textContent = ""; $("catchHint").textContent = "";
      var done = $("catchDone");
      done.innerHTML = "<div class='caughtCreature'>" + artText(currentFormArt()) + "</div>" +
                       "<div class='caughtCheck'>✨</div>" +
                       "<div class='caughtText'>ה" + c.he + " התחזק!</div>";
      done.classList.add("show");
      speak("ה" + c.he + " התחזק!");
      setTimeout(function(){
        done.classList.remove("show"); done.innerHTML = "";
        $("ovCatch").classList.remove("show");
        run.phase = "learn";
        gotoNextStep();
      }, 1500);
    } else { moveAway(); }
  };
}

/* ============ session control (open-ended, switchable mid-stream) ============ */
function startSession(gameId){

  run.gameId = gameId;
  run.level  = (profile.games[gameId] && profile.games[gameId].level) || "easy";
